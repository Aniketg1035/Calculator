<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #e8ff57;
      --accent-dim: #b8cc30;
      --text: #f0f0f0;
      --text-muted: #888;
      --op: #2a2a35;
      --op-hover: #343444;
      --num: #1e1e26;
      --num-hover: #26262f;
      --danger: #ff5f6d;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,87,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,87,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .calc-wrapper {
      position: relative;
      animation: floatIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .label {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0.8;
    }

    .calculator {
      width: 320px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 40px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(232,255,87,0.04);
    }

    /* Display */
    .display {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px 12px;
      margin-bottom: 16px;
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
    }

    .display .history {
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
      min-height: 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-bottom: 4px;
      transition: opacity 0.2s;
    }

    .display .current {
      font-size: 36px;
      font-weight: 400;
      color: var(--text);
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: transform 0.1s ease, color 0.15s;
      line-height: 1.1;
    }

    .display .current.pop {
      transform: scale(1.04);
      color: var(--accent);
    }

    /* Button grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    button {
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      height: 60px;
      cursor: pointer;
      transition: background 0.12s, transform 0.08s, box-shadow 0.12s;
      position: relative;
      overflow: hidden;
      outline: none;
    }

    button:active { transform: scale(0.93); }

    /* Ripple */
    button::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: rgba(255,255,255,0.07);
      opacity: 0;
      transition: opacity 0.2s;
    }
    button:hover::after { opacity: 1; }

    /* Number buttons */
    .btn-num {
      background: var(--num);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.04);
    }
    .btn-num:hover { background: var(--num-hover); }

    /* Operator buttons */
    .btn-op {
      background: var(--op);
      color: var(--accent);
      border: 1px solid rgba(232,255,87,0.08);
      font-size: 18px;
    }
    .btn-op:hover {
      background: var(--op-hover);
      box-shadow: 0 0 12px rgba(232,255,87,0.08);
    }

    /* Clear / CE */
    .btn-clear {
      background: rgba(255,95,109,0.12);
      color: var(--danger);
      border: 1px solid rgba(255,95,109,0.15);
    }
    .btn-clear:hover { background: rgba(255,95,109,0.2); }

    /* Equals */
    .btn-eq {
      background: var(--accent);
      color: #0e0e10;
      font-size: 20px;
      font-weight: 700;
      border: none;
      box-shadow: 0 4px 20px rgba(232,255,87,0.25);
    }
    .btn-eq:hover {
      background: var(--accent-dim);
      box-shadow: 0 4px 28px rgba(232,255,87,0.4);
    }

    /* Zero spans 2 cols */
    .span2 { grid-column: span 2; }

    /* Percent / +/- */
    .btn-util {
      background: var(--op);
      color: var(--text-muted);
      border: 1px solid rgba(255,255,255,0.04);
      font-size: 15px;
    }
    .btn-util:hover { background: var(--op-hover); color: var(--text); }

    /* Backspace icon */
    .btn-back {
      background: var(--op);
      color: var(--text-muted);
      border: 1px solid rgba(255,255,255,0.04);
      font-size: 18px;
    }
    .btn-back:hover { background: var(--op-hover); color: var(--text); }

    /* Error shake */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }
    .shake { animation: shake 0.35s ease; }
  </style>
</head>
<body>

<div class="calc-wrapper">
  <div class="label">Calculator</div>
  <div class="calculator">
    <div class="display" id="display">
      <div class="history" id="history"></div>
      <div class="current" id="current">0</div>
    </div>
    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-util" onclick="toggleSign()">+/−</button>
      <button class="btn-util" onclick="inputPercent()">%</button>
      <button class="btn-op"   onclick="inputOp('/')">÷</button>
      <!-- Row 2 -->
      <button class="btn-num"  onclick="inputNum('7')">7</button>
      <button class="btn-num"  onclick="inputNum('8')">8</button>
      <button class="btn-num"  onclick="inputNum('9')">9</button>
      <button class="btn-op"   onclick="inputOp('*')">×</button>
      <!-- Row 3 -->
      <button class="btn-num"  onclick="inputNum('4')">4</button>
      <button class="btn-num"  onclick="inputNum('5')">5</button>
      <button class="btn-num"  onclick="inputNum('6')">6</button>
      <button class="btn-op"   onclick="inputOp('-')">−</button>
      <!-- Row 4 -->
      <button class="btn-num"  onclick="inputNum('1')">1</button>
      <button class="btn-num"  onclick="inputNum('2')">2</button>
      <button class="btn-num"  onclick="inputNum('3')">3</button>
      <button class="btn-op"   onclick="inputOp('+')">+</button>
      <!-- Row 5 -->
      <button class="btn-num span2" onclick="inputNum('0')">0</button>
      <button class="btn-num"  onclick="inputDot()">.</button>
      <button class="btn-eq"   onclick="calculate()">=</button>
    </div>
  </div>
</div>

<script>
  let currentVal  = '0';
  let storedVal   = null;
  let operator    = null;
  let shouldReset = false;

  const currentEl = document.getElementById('current');
  const historyEl = document.getElementById('history');

  function updateDisplay(val) {
    // Format large numbers nicely
    let display = val;
    if (!isNaN(val) && val !== '' && !val.toString().includes('e')) {
      const num = parseFloat(val);
      if (Number.isFinite(num)) {
        // Don't format if still typing a decimal
        if (!val.toString().endsWith('.') && !val.toString().endsWith('0')) {
          display = parseFloat(val.toString()).toLocaleString('en-US', { maximumFractionDigits: 10 });
        }
      }
    }
    currentEl.textContent = display;
    // Pop animation
    currentEl.classList.remove('pop');
    void currentEl.offsetWidth;
    currentEl.classList.add('pop');
    setTimeout(() => currentEl.classList.remove('pop'), 120);
  }

  function inputNum(n) {
    if (shouldReset) {
      currentVal = n;
      shouldReset = false;
    } else {
      if (currentVal === '0' && n !== '.') {
        currentVal = n;
      } else {
        if (currentVal.replace('-','').replace('.','').length >= 12) return;
        currentVal += n;
      }
    }
    updateDisplay(currentVal);
  }

  function inputDot() {
    if (shouldReset) { currentVal = '0.'; shouldReset = false; updateDisplay(currentVal); return; }
    if (!currentVal.includes('.')) {
      currentVal += '.';
      currentEl.textContent = currentVal;
    }
  }

  function inputOp(op) {
    if (operator && !shouldReset) {
      calculate(true);
    }
    storedVal   = parseFloat(currentVal);
    operator    = op;
    shouldReset = true;
    const opSymbol = {'+':'+', '-':'−', '*':'×', '/':'÷'}[op];
    historyEl.textContent = `${formatNum(storedVal)} ${opSymbol}`;
  }

  function calculate(chain = false) {
    if (operator === null || storedVal === null) return;
    const a = storedVal;
    const b = parseFloat(currentVal);
    const opSymbol = {'+':'+', '-':'−', '*':'×', '/':'÷'}[operator];
    let result;
    switch (operator) {
      case '+': result = a + b; break;
      case '-': result = a - b; break;
      case '*': result = a * b; break;
      case '/':
        if (b === 0) { showError('Divide by 0'); return; }
        result = a / b;
        break;
    }
    if (!chain) {
      historyEl.textContent = `${formatNum(a)} ${opSymbol} ${formatNum(b)} =`;
    }
    // Handle floating-point drift
    result = parseFloat(result.toPrecision(12));
    currentVal  = result.toString();
    if (!chain) { operator = null; storedVal = null; }
    shouldReset = true;
    updateDisplay(currentVal);
  }

  function clearAll() {
    currentVal  = '0';
    storedVal   = null;
    operator    = null;
    shouldReset = false;
    historyEl.textContent = '';
    updateDisplay('0');
  }

  function toggleSign() {
    currentVal = (parseFloat(currentVal) * -1).toString();
    updateDisplay(currentVal);
  }

  function inputPercent() {
    currentVal = (parseFloat(currentVal) / 100).toString();
    updateDisplay(currentVal);
  }

  function showError(msg) {
    currentEl.textContent = msg;
    currentEl.classList.add('shake');
    setTimeout(() => { currentEl.classList.remove('shake'); clearAll(); }, 700);
  }

  function formatNum(n) {
    return parseFloat(n.toPrecision(12)).toLocaleString('en-US', { maximumFractionDigits: 10 });
  }

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') inputNum(e.key);
    else if (e.key === '.') inputDot();
    else if (e.key === '+') inputOp('+');
    else if (e.key === '-') inputOp('-');
    else if (e.key === '*') inputOp('*');
    else if (e.key === '/') { e.preventDefault(); inputOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') {
      if (shouldReset || currentVal.length === 1 || (currentVal.length === 2 && currentVal[0] === '-')) {
        clearAll();
      } else {
        currentVal = currentVal.slice(0, -1) || '0';
        updateDisplay(currentVal);
      }
    }
    else if (e.key === 'Escape') clearAll();
    else if (e.key === '%') inputPercent();
  });
</script>
</body>
</html>
